<!DOCTYPE html>
<html>
<head>
    <title>Demo Scanner</title>
   <script src="{{ url_for('static', filename='js/html5-qrcode.min.js') }}"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        
        /* Button Style */
        .scan-btn {
            background-color: #28a745;
            color: white;
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        #preview-image { max-width: 200px; margin-top: 20px; border: 1px solid #ccc; }
        #result { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h1>GUEST CHECK-IN/OUT</h1>
    
    <input type="file" id="qr-input-file" accept="image/*" style="display:none;">

    <button class="scan-btn" onclick="document.getElementById('qr-input-file').click()">
        📸 Scan QR Code Image
    </button>

    <br><img id="preview-image" src="" style="display:none;">
    <div id="result"></div>

    <div id="reader" style="display:none;"></div>

    <script>
     function onScanSuccess(decodedText) {
    // THIS STRIPS THE URL SO ONLY THE ID (ELR-1001) IS SENT
    let bookingId = decodedText.includes('/') ? decodedText.split('/').pop() : decodedText;

    fetch('/admin/scan-action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ booking_id: bookingId })
    })
    .then(response => response.json())
    .then(data => {
        alert(data.message); // This will tell you if it Checked-in or Checked-out
        window.location.reload(); // Reload to update the page
    })
    .catch(err => alert("Error: " + err));
}
    </script>
</body>
</html>
