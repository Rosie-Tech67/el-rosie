<!DOCTYPE html>
<html>
<head>
    <title>Staff Quick Scan</title>
    <script src="{{ url_for('static', filename='js/html5-qrcode.min.js') }}"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background: #fbf9f6; }
        #reader { width: 100%; max-width: 500px; margin: 20px auto; border: 2px solid #705335; }
        .btn { padding: 15px 30px; margin: 10px; border: none; cursor: pointer; color: white; font-size: 16px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Staff Quick Scan</h1>

    <div id="reader"></div>

    <div id="control-panel" style="display:none; text-align:center; padding: 20px;">
        <h3 id="scanned-id">Booking ID: ...</h3>
        <p>Select action for this guest:</p>
        <button class="btn" onclick="processAction('check-in')" style="background:green;">Check-In Guest</button>
        <button class="btn" onclick="processAction('check-out')" style="background:red;">Check-Out Guest</button>
        <br>
        <button class="btn" onclick="location.reload()" style="background:#555;">Cancel/Rescan</button>
    </div>

    <p id="result">Point your phone camera at the QR code...</p>

    <script>
        let currentBookingId = "";
        
        // Initialize Scanner
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: {width: 250, height: 250},
            facingMode: "environment" 
        });

        function onScanSuccess(decodedText, decodedResult) {
            html5QrcodeScanner.clear();
            
            // Extracts the last part of a URL or raw ID
            currentBookingId = decodedText.split('/').filter(Boolean).pop();
            
            document.getElementById('scanned-id').innerText = "Booking ID: " + currentBookingId;
            document.getElementById('control-panel').style.display = 'block';
            document.getElementById('result').innerText = "Scan successful. Please select action.";
        }

        function processAction(action) {
            document.getElementById('result').innerText = "Processing...";
            
            fetch("{{ url_for('quick_scan') }}", {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token() if csrf_token else "" }}'
                },
                body: JSON.stringify({ 
                    booking_id: currentBookingId, 
                    status: action 
                })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                location.reload(); 
            })
            .catch(err => {
                console.error("Fetch Error:", err);
                alert("Server Error. Check terminal logs.");
            });
        }

        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
